<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAMEL FIGHTING WITH CEZAN</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#7fb6d6,#3b7d3b);
color:white;
text-align:center;
}

h1{margin:6px;}

canvas{
background:linear-gradient(#a6d9ff,#4c9a4c);
display:block;
margin:auto;
}

/* MENU */
#menu,#result{
position:absolute;
top:30%;
width:100%;
}

button{
padding:12px 20px;
font-size:18px;
margin:6px;
border:none;
border-radius:6px;
}

/* JOYSTICK */
.joy{
position:fixed;
bottom:30px;
left:30px;
width:120px;
height:120px;
background:rgba(255,255,255,.2);
border-radius:50%;
}
.knob{
position:absolute;
left:35px;
top:35px;
width:50px;
height:50px;
background:white;
border-radius:50%;
}

/* BUTTONS */
.controls{
position:fixed;
bottom:40px;
right:30px;
}
.ctrlBtn{
width:70px;
height:70px;
border-radius:50%;
margin:6px;
font-size:11px;
border:none;
background:white;
}

#result{display:none;}
</style>
</head>

<body>

<h1>TEAMEL FIGHTING WITH CEZAN</h1>
<p>Owner: Pacapac John Carlo</p>

<div id="menu">
<h2>Sana all malakas... pero malakas kaba sa kanya?</h2>
<button onclick="startGame()">START</button>
<p>NO RAGEBAIT OK?</p>
</div>

<div id="result">
<h2 id="resultText"></h2>
<button onclick="restartGame()">Lalaban ng Pro</button>
<button onclick="backMenu()">Uuwing Talunan</button>
</div>

<canvas id="game" width="900" height="420"></canvas>

<div class="joy" id="joy"><div class="knob" id="knob"></div></div>

<div class="controls">
<button class="ctrlBtn" onclick="attack()">ATTACK</button>
<button class="ctrlBtn" onclick="jump()">JUMP</button>
<button class="ctrlBtn" onclick="crouch()">CROUCH</button>
<button class="ctrlBtn" onclick="special()">SPECIAL</button>
</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let running=false;
let superSaiyan=false;
let effects=[];

let player,enemy;

function resetCharacters(){
player={x:150,y:0,vx:0,vy:0,hp:300,onGround:false};
enemy={x:700,y:0,vx:0,vy:0,hp:300};
}

resetCharacters();

const gravity=0.6;

/* PLATFORMS */
const platforms=[
{x:0,y:380,w:900,h:40},
{x:250,y:300,w:200,h:15},
{x:550,y:230,w:200,h:15}
];

/* SPIKES SA GILID */
const spikes=[
{x:0,y:350,w:20,h:30},
{x:880,y:350,w:20,h:30}
];

/* SOUND */
function sound(freq,time=0.12){
let a=new (window.AudioContext||webkitAudioContext)();
let o=a.createOscillator();
o.connect(a.destination);
o.frequency.value=freq;
o.start();
o.stop(a.currentTime+time);
}

/* MENU */
function startGame(){
document.getElementById("menu").style.display="none";
running=true;
loop();
}

function restartGame(){
document.getElementById("result").style.display="none";
resetCharacters();
running=true;
loop();
}

function backMenu(){
document.getElementById("result").style.display="none";
document.getElementById("menu").style.display="block";
resetCharacters();
}

/* JOYSTICK */
let joy=document.getElementById("joy");
let knob=document.getElementById("knob");
let active=false;

joy.addEventListener("touchstart",()=>active=true);

joy.addEventListener("touchmove",e=>{
if(!active)return;
let rect=joy.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left-60;
player.vx=x*0.08;
knob.style.transform=`translate(${x}px,0)`;
});

joy.addEventListener("touchend",()=>{
active=false;
player.vx=0;
knob.style.transform="translate(0,0)";
});

/* ACTIONS */
function jump(){
if(player.onGround){
player.vy=-12;
sound(400);

/* COMBO 👊 */
effects.push({type:"punch",x:player.x});
effects.push({type:"punch",x:player.x+20});

if(Math.abs(player.x-enemy.x)<80) enemy.hp-=20;
}
}

function crouch(){
sound(180);
}

function attack(){
sound(200);
if(Math.abs(player.x-enemy.x)<60) enemy.hp-=15;
}

function special(){
if(superSaiyan)return;
superSaiyan=true;
sound(700,0.3);

/* 🔥🔥🔥 */
for(let i=0;i<3;i++){
setTimeout(()=>{
effects.push({type:"fire",x:player.x});
if(Math.abs(player.x-enemy.x)<120) enemy.hp-=18;
},i*250);
}

setTimeout(()=>superSaiyan=false,5000);
}

/* PHYSICS */
function physics(p){
p.vy+=gravity;
p.x+=p.vx;
p.y+=p.vy;
p.onGround=false;

for(let pl of platforms){
if(p.x>pl.x-20&&p.x<pl.x+pl.w+20){
if(p.y+20>pl.y&&p.y+20<pl.y+25&&p.vy>=0){
p.y=pl.y-20;
p.vy=0;
p.onGround=true;
}
}
}

/* SPIKE DEATH */
for(let s of spikes){
if(p.x<s.x+s.w && p.x>s.x && p.y>340){
p.hp=0;
}
}
}

/* AI (mabagal) */
function ai(){
enemy.vx=(player.x<enemy.x?-1:1)*0.6;
if(Math.abs(player.x-enemy.x)<50) player.hp-=0.3;
}

/* DRAW STICKMAN */
function stick(p,color){
ctx.strokeStyle=color;
ctx.lineWidth=4;

ctx.beginPath();
ctx.arc(p.x,p.y-25,10,0,6.28);
ctx.moveTo(p.x,p.y-15); ctx.lineTo(p.x,p.y+20);
ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-15,p.y+20);
ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+15,p.y+20);
ctx.stroke();

/* SWORD kapag di gumagalaw */
if(Math.abs(p.vx)<0.2){
ctx.fillRect(p.x+10,p.y-10,4,20);
}
}

/* EFFECTS */
function drawEffects(){
ctx.font="26px Arial";
effects.forEach(e=>{
if(e.type==="fire") ctx.fillText("🔥",e.x,260);
if(e.type==="punch") ctx.fillText("👊🏻",e.x,250);
});
effects=[];
}

/* CROWD */
function crowd(){
ctx.fillStyle="black";
ctx.fillText("Vincent: GO TOL!",200,410);
ctx.fillText("Carlo: GO XIAN!",500,410);
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,900,420);

/* platforms */
ctx.fillStyle="#5e3b2c";
for(let pl of platforms)ctx.fillRect(pl.x,pl.y,pl.w,pl.h);

/* spikes */
ctx.fillStyle="red";
for(let s of spikes)ctx.fillRect(s.x,s.y,s.w,s.h);

/* HP */
ctx.fillStyle="violet";
ctx.fillRect(30,20,player.hp,15);
ctx.fillStyle="black";
ctx.fillRect(670,20,enemy.hp,15);

stick(player,"violet");
stick(enemy,"black");

drawEffects();
crowd();
}

/* LOOP */
function loop(){
if(!running)return;

physics(player);
physics(enemy);
ai();
draw();

if(player.hp<=0) endGame(false);
if(enemy.hp<=0) endGame(true);

requestAnimationFrame(loop);
}

/* RESULT */
function endGame(win){
running=false;
sound(win?650:120);

document.getElementById("result").style.display="block";
document.getElementById("resultText").innerText=
win?"Nc tol pwede kana maging pro":
"B.O.B.O";
}
</script>


</body></html>
